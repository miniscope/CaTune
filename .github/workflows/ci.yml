name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Third-party actions pinned to SHAs; first-party actions/* stay on major
# version tags. SHA pins prevent a compromised or retagged action release
# from silently landing on CI. When bumping, resolve the new SHA with
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` and update both the
# pin and the trailing # vX.Y.Z comment.

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            **/.tsbuildinfo
            **/node_modules/.vite
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build:apps

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/solver
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-15)
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: 'crates/solver -> target'

      - name: Format check
        run: cargo fmt --all --check

      # `--no-default-features --features jsbindings` skips the pyo3 feature
      # (which needs Python dev headers) and keeps clippy focused on the WASM
      # surface the apps actually ship.
      - name: Clippy
        run: cargo clippy --no-default-features --features jsbindings -- -D warnings

      - name: Tests
        run: cargo test --no-default-features --features jsbindings

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-15)

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin[patchelf] numpy pydantic pytest h5py zarr ruff mypy
        working-directory: python

      - name: Build and install (dev)
        run: .venv/bin/maturin develop --features pybindings
        working-directory: python

      - name: Ruff
        run: .venv/bin/ruff check src/ tests/
        working-directory: python

      - name: Mypy
        run: .venv/bin/mypy src/
        working-directory: python

      # `-m "not integration"` skips tests that require Playwright + a live
      # browser (see pytest marker in pyproject.toml). Those run outside CI.
      - name: Pytest
        run: .venv/bin/pytest -m "not integration"
        working-directory: python

  supabase:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: test
      PGPASSWORD: test
      PGDATABASE: test
    steps:
      - uses: actions/checkout@v6

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Apply migrations and run RLS policy matrix
        run: ./scripts/test-rls.sh
        env:
          USE_DOCKER: ''

      - name: Install Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x

      - name: Deno tests (geo-session edge function)
        working-directory: supabase/functions/geo-session
        # --no-check skips type-checking of the transitive npm dep graph
        # (supabase-js pulls @types/node which requires nodeModulesDir).
        # The edge runtime doesn't type-check at deploy time either.
        run: deno test --no-check --allow-env --allow-net --lock=deno.lock index.test.ts
