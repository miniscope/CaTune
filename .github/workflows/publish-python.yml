name: Publish Python Package

on:
  push:
    tags: ['py/v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/py/v')
        run: sed -i "s/^version = .*/version = \"${GITHUB_REF_NAME#py/v}\"/" python/pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin[patchelf] numpy pytest h5py zarr
        working-directory: python

      - name: Build and install (dev)
        run: .venv/bin/maturin develop --features pybindings
        working-directory: python

      - name: Run tests
        run: .venv/bin/pytest
        working-directory: python

  build-wheels:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag (Unix)
        if: startsWith(github.ref, 'refs/tags/py/v') && runner.os != 'Windows'
        run: sed -i "s/^version = .*/version = \"${GITHUB_REF_NAME#py/v}\"/" python/pyproject.toml

      - name: Set version from tag (Windows)
        if: startsWith(github.ref, 'refs/tags/py/v') && runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME.Replace("py/v", "")
          (Get-Content python/pyproject.toml) -replace '^version = .*', "version = `"$version`"" | Set-Content python/pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features pybindings -i python3.12
          sccache: 'true'
          manylinux: auto
          working-directory: python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist

  build-sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/py/v')
        run: sed -i "s/^version = .*/version = \"${GITHUB_REF_NAME#py/v}\"/" python/pyproject.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
